<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FinanceFlow Elite | System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root { --accent: #0891b2; --glass: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: 'Outfit', sans-serif; background: #e2e8f0; color: var(--text); margin: 0; min-height: 100vh; padding: 20px; }
        
        .box { background: var(--glass); padding: 40px; border-radius: 25px; text-align: center; width: 350px; margin: 100px auto; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { background: var(--accent); border: none; padding: 12px; border-radius: 8px; color: white; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        
        #app { display: none; width: 90%; max-width: 900px; margin: auto; }
        .grid-forms { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .form-panel { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        input { background: #f8fafc; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box;}
        
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        
        table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h1>📊 Welcome</h1>
        <button onclick="iniciarSesion('admin')">🔐 Administrador</button>
        <button style="background: #64748b;" onclick="iniciarSesion('guest')">👁️ Invitado</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Dashboard</h1>
            <button style="width:auto;" onclick="location.reload()">Salir</button>
        </div>
        
        <div class="grid-stats">
            <div class="card" style="background: #f8fafc;">Balance Final<div id="balance-total" style="font-size: 1.5rem; font-weight: 800;">$0.00</div></div>
            <div class="card">Ingresos<div id="total-ingresos" style="color: #059669; font-size: 1.5rem; font-weight: 800;">$0.00</div></div>
            <div class="card">Gastos<div id="total-gastos" style="color: #dc2626; font-size: 1.5rem; font-weight: 800;">$0.00</div></div>
            <div class="card">Ganancia Extra<div id="total-ganancia" style="color: #0891b2; font-size: 1.5rem; font-weight: 800;">$0.00</div></div>
        </div>

        <div class="grid-forms" id="edit-area">
            <div class="form-panel">
                <h3>Ingreso</h3>
                <input type="text" id="desc-i" placeholder="Descripción">
                <input type="number" id="monto-i" placeholder="Monto">
                <button onclick="add('Ingreso')">Registrar</button>
            </div>
            <div class="form-panel">
                <h3>Gasto</h3>
                <input type="text" id="desc-g" placeholder="Descripción">
                <input type="number" id="monto-g" placeholder="Monto">
                <button onclick="add('Gasto')" style="background: #dc2626;">Registrar</button>
            </div>
            <div class="form-panel">
                <h3>Ganancia</h3>
                <input type="text" id="desc-ga" placeholder="Descripción">
                <input type="number" id="monto-ga" placeholder="Monto">
                <button onclick="add('Ganancia')" style="background: #0891b2;">Registrar</button>
            </div>
        </div>

        <table>
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Total</th><th id="th-acc">Acción</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('finanzas_v4')) || [];
        const PASSWORD_BASE64 = "YWRtaW4xMjM="; 
        let esAdmin = false;

        function iniciarSesion(modo) {
            if (modo === 'admin') {
                const pass = prompt("Contraseña de Admin:");
                if (btoa(pass) !== PASSWORD_BASE64) return alert("Acceso Denegado");
                esAdmin = true;
            }
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            if (!esAdmin) document.getElementById('edit-area').style.display = 'none';
            update();
        }

        function add(tipo) {
            const idDesc = tipo === 'Ingreso' ? 'desc-i' : (tipo === 'Gasto' ? 'desc-g' : 'desc-ga');
            const idMonto = tipo === 'Ingreso' ? 'monto-i' : (tipo === 'Gasto' ? 'monto-g' : 'monto-ga');
            
            const desc = document.getElementById(idDesc).value;
            const monto = parseFloat(document.getElementById(idMonto).value);
            
            if(!desc || !monto) return alert("Llena los campos");
            
            const fecha = new Date().toLocaleDateString();
            document.getElementById(idDesc).value = '';
            document.getElementById(idMonto).value = '';

            data.unshift({f: fecha, d: desc, t: tipo, m: monto});
            localStorage.setItem('finanzas_v4', JSON.stringify(data));
            update();
        }

        function update() {
            const body = document.getElementById('lista'); body.innerHTML = '';
            let ing = 0, gas = 0, gan = 0;
            
            data.forEach((item, idx) => {
                if(item.t === 'Ingreso') ing += item.m; 
                else if(item.t === 'Gasto') gas += item.m;
                else gan += item.m;

                body.innerHTML += `<tr>
                    <td>${item.f}</td>
                    <td>${item.t}</td>
                    <td>${item.d}</td>
                    <td style="color:${item.t==='Ingreso'?'#059669':(item.t==='Gasto'?'#dc2626':'#0891b2')}; font-weight:600;">$${item.m.toFixed(2)}</td>
                    <td>${esAdmin ? `<button onclick="del(${idx})" style="color:red; background:none; border:none; cursor:pointer;">✕</button>` : ''}</td>
                </tr>`;
            });

            let balance = ing - gas + gan;
            document.getElementById('total-ingresos').innerText = `$${ing.toFixed(2)}`;
            document.getElementById('total-gastos').innerText = `$${gas.toFixed(2)}`;
            document.getElementById('total-ganancia').innerText = `$${gan.toFixed(2)}`;
            const bE = document.getElementById('balance-total');
            bE.innerText = `$${balance.toFixed(2)}`;
            bE.style.color = balance >= 0 ? '#059669' : '#dc2626';
        }

        function del(idx) { data.splice(idx, 1); localStorage.setItem('finanzas_v4', JSON.stringify(data)); update(); }
    </script>
</body>
</html>
